name: Release sender app

# Manual: (in the PUBLIC printnel-releases repo) Actions → "Release sender app" → Run.
# Builds the SIGNED Windows + macOS installers from the private source and
# publishes them here as a Release with an auto-update feed (latest.json).
# The installed app reads that feed on launch and offers "Update".
on:
  workflow_dispatch:

permissions:
  contents: write # publish the Release in this (public) repo

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: cyberentic/Printnel
          ssh-key: ${{ secrets.SOURCE_DEPLOY_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: sender/src-tauri

      # npm workspaces: install once from the repo root (single root package-lock.json).
      # tauri-action's beforeBuildCommand (npm run build) still runs in sender/ and finds vite on
      # the hoisted node_modules/.bin via ancestor PATH.
      - name: Install frontend dependencies
        run: npm ci

      - name: Build, sign & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # WITHOUT THESE TWO, EVERY INSTALLER SHIPS WITH NO GOOGLE AND NO EMAIL LOGIN.
          # `src/supabase.ts` builds its client from these at BUILD time and exports
          # `googleLoginEnabled = !!supabase`. The keys live only in the gitignored `.env`, so CI
          # checked out the source, found no keys, and the app correctly concluded Google could not
          # work and hid the door — "no dead buttons". Every release up to 0.7.0 / 0.4.1 was built
          # blind this way, and it looked like a UI bug for weeks. The anon key is public by design
          # (it already ships inside the installer; RLS is what protects the data).
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Email needs an SMTP sender in Supabase too. Unset = on (the code tests `!== "off"`);
          # set repo Variable VITE_EMAIL_LOGIN to "off" to hide that door without a code change.
          VITE_EMAIL_LOGIN: ${{ vars.VITE_EMAIL_LOGIN }}
          # Set repo Variable VITE_API_BASE to your live API once deployed; empty = localhost pilot.
          # The shop workflow always had this hook; this one never did, so the customer app could not
          # have been pointed at a server even after one exists. Same class of bug as the keys above:
          # CI building blind. No effect today — empty falls back to the same localhost as now.
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        with:
          projectPath: sender
          tagName: sender-v__VERSION__
          releaseName: "Printnel Sender v__VERSION__"
          releaseBody: "Your app will offer this update automatically on next launch."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
